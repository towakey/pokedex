name: Generate & Deploy Static JSON API

on:
  push:
    branches: [master]
    paths:
      - 'pokedex/**'
      - 'ability/**'
      - 'type/**'
      - 'item/**'
      - 'tag.json'
      - 'config/**'
      - 'translate/**'
      - 'tools/generate_api.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate static JSON API
        run: python3 tools/generate_api.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
